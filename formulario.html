<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <h1>Exemplo de Formulário</h1>
    <form>
        <label>Nome:</label> <!-- Etiqueta -->
        <input type="text"> <br><br><!-- Tipo de input -->
        <label>Senha:</label>
        <input type="password"> <br><br>
        <label>Sugestão:</label>
        <textarea rows="5" cols="30" minlength="1"></textarea>
        <br><br>
        <label>Seleciona sua cidade:</label>
        <br>
        <select> <!-- caixinha de seleção -->
            <option>Aragarças-GO</option>
            <option>Barra do Garças-MT</option>
            <option>Pontal do Araguaia-MT</option>
        </select>
        <br><br>
        <label>Você mora na cidade em que estuda?</label>
        <br>
        <label>Sim</label>
        <input type="radio" name="opcao" checked>
        <br>
        <label>Não</label>
        <input type="radio" name="opcao">
        <br><br>
        <label>Preferências</label>
        <br>
        <label>Praia:</label>
        <input input type="checkbox"> <!-- permite várias seleções -->
        <br>
        <label>Cachoeira:</label>
        <input input type="checkbox">
        <br>
        <label>Águas termais</label>
        <input input type="checkbox">
        <br><br>
        <label>Cor favorita:</label>
        <input type="color">
        <br><br>
        <label>Qual é o dia do seu aniversário?</label>
        <input type="date">
        <br><br>
        <label>E-mail:</label>
        <input type="email">
        <br><br>
        <label>Sua melhor foto</label> <br>
        <input type="file">
        <br><br>
        <label>Volume</label>
        <input type="range">
        <br><br>
        <label>Telefone</label>
        <input type="tel">
        <button>ENVIAR</button>
    </form>
</body>
</html>
